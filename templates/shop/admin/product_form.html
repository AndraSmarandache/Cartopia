{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - Admin{% endblock %}

{% block content %}
<h2 class="mb-4">{{ title }}</h2>

<div class="row">
    <div class="col-md-10">
        <div class="card shadow-sm">
            <div class="card-body">
                {% crispy form %}
            </div>
        </div>
    </div>
</div>

<a href="{% url 'admin_product_list' %}" class="btn btn-secondary mt-3"><i class="bi bi-x"></i> Cancel</a>
{% endblock %}
